spring:
  datasource:
    url: jdbc:h2:mem:mercedesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

showroom:
  name: "Mercedes-Benz Tbilisi Showroom"
  support-email: "dev-support@mercedes-showroom.ge"
